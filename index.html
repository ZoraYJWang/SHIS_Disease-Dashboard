<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Somaliland Disease Surveillance</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>

  <h1>Somaliland Disease Surveillance</h1>
  <p class="subtitle">Jan – Apr 2026 &nbsp;·&nbsp; 9 hospitals &nbsp;·&nbsp; ICD-10 based &nbsp;·&nbsp; TaiwanICDF / MoHD</p>

  <div class="disease-row" id="diseaseRow"></div>
  <div class="pills" id="filterRow"></div>
  <div class="stats" id="statsRow"></div>

  <div class="chart-grid">
    <div class="chart-box full">
      <div class="chart-title">Weekly case trend</div>
      <div id="legendWeekly" class="legend"></div>
      <div style="position:relative;height:190px"><canvas id="chartWeekly"></canvas></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Cases by hospital</div>
      <div style="position:relative;height:210px"><canvas id="chartHosp"></canvas></div>
    </div>
    <div class="chart-box">
      <div class="chart-title">Age group distribution</div>
      <div style="position:relative;height:210px"><canvas id="chartAge"></canvas></div>
    </div>
    <div class="chart-box full">
      <div class="chart-title">Monthly totals</div>
      <div style="position:relative;height:140px"><canvas id="chartMonthly"></canvas></div>
    </div>
  </div>

  <p class="note">Source: All_Hospitals_Data_for_last_Three_month.xlsx</p>

  <script src="script.js"></script>
</body>
</html>
